name: Backend CI (Java)

on:
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "backend/**"

jobs:
  build:
    name: Build and Package Java Backend
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compile Java
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path backend/bin
          $files = Get-ChildItem -Path backend/src -Recurse -Filter *.java | Select-Object -ExpandProperty FullName
          if ($files.Count -eq 0) {
            Write-Error "No Java files found!"
            exit 1
          }
          javac -d backend/bin $files

      - name: Create Executable JAR
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path backend/out
          "Main-Class: com.a_3_group_3.filecompressor.Main" | Out-File backend/manifest.txt -Encoding ASCII
          jar cvfm backend/out/SecureArchiver.jar backend/manifest.txt -C backend/bin .

      - name: Create App Image (jpackage)
        shell: pwsh
        run: |
          jpackage `
            --name SecureArchiver `
            --input backend/out `
            --main-jar SecureArchiver.jar `
            --main-class com.a_3_group_3.filecompressor.Main `
            --type app-image `
            --dest backend/dist `
            --win-console

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureArchiver-JAR
          path: backend/out/SecureArchiver.jar

      - name: Upload App Image
        uses: actions/upload-artifact@v4
        with:
          name: SecureArchiver-App
          path: backend/dist/SecureArchiver/
